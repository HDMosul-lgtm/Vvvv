<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرك البحث عن رقم الهاتف | OSINT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-dark: #a88a3a;
            --gold-light: #f5d77b;
            --dark: #0a0a0f;
            --dark-card: rgba(15, 15, 30, 0.92);
            --text-light: #f0f0f0;
            --text-muted: #8888aa;
            --border-gold: 1px solid rgba(212, 175, 55, 0.25);
            --shadow-gold: 0 8px 40px rgba(212, 175, 55, 0.08);
            --radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #06060e;
            color: var(--text-light);
            min-height: 100vh;
        }
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at 20% 30%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 70%, rgba(212, 175, 55, 0.02) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.4), transparent);
            border-radius: 50%;
            animation: floatParticle 12s infinite ease-in-out;
        }
        @keyframes floatParticle {
            0%, 100% { transform: translateY(0px) scale(1); opacity: 0.2; }
            50% { transform: translateY(-60px) scale(1.5); opacity: 0.6; }
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 25px 20px 50px;
            position: relative;
            z-index: 1;
        }
        .header {
            text-align: center;
            padding: 25px 20px 15px;
        }
        .header .logo {
            font-size: 30px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmerText 3s linear infinite;
            letter-spacing: 2px;
        }
        @keyframes shimmerText {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        .header .sub { color: var(--text-muted); font-size: 14px; margin-top: 6px; letter-spacing: 1px; }
        .search-card {
            background: var(--dark-card);
            backdrop-filter: blur(16px);
            border: var(--border-gold);
            border-radius: var(--radius);
            padding: 30px 28px 25px;
            box-shadow: var(--shadow-gold);
            transition: all 0.3s;
            margin-bottom: 25px;
        }
        .search-card:hover { border-color: rgba(212, 175, 55, 0.35); }
        .search-card .title-area { text-align: center; margin-bottom: 20px; }
        .search-card .title-area h2 { font-size: 20px; font-weight: 700; color: var(--text-light); }
        .search-card .title-area p { color: var(--text-muted); font-size: 13px; }
        .country-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 8px;
            margin-bottom: 16px;
        }
        .country-btn {
            padding: 10px 6px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-family: 'Cairo', sans-serif;
        }
        .country-btn:hover { background: rgba(212, 175, 55, 0.06); border-color: var(--border-gold); }
        .country-btn.active { background: rgba(212, 175, 55, 0.1); border-color: var(--gold); color: var(--gold); }
        .country-btn .code { display: block; font-size: 16px; font-weight: 800; color: var(--text-light); }
        .country-btn .name { font-size: 10px; opacity: 0.6; }
        .input-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .input-wrap { flex: 1; min-width: 200px; position: relative; }
        .input-wrap .prefix {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            font-weight: 700;
            font-size: 14px;
            pointer-events: none;
        }
        .input-wrap input {
            width: 100%;
            padding: 16px 55px 16px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            color: var(--text-light);
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
            direction: ltr;
            text-align: right;
        }
        .input-wrap input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 30px rgba(212, 175, 55, 0.04); }
        .input-wrap input::placeholder { color: #444466; font-size: 14px; }
        .btn-search {
            padding: 16px 35px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 12px;
            color: #0a0a0f;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }
        .btn-search:hover { transform: scale(1.03); box-shadow: 0 0 50px rgba(212, 175, 55, 0.25); }
        .results-area { display: none; margin-top: 20px; animation: fadeUp 0.4s ease; }
        .results-area.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin: 15px 0 20px;
        }
        .link-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.3);
            border: var(--border-gold);
            border-radius: 10px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }
        .link-btn:hover { background: rgba(212, 175, 55, 0.1); border-color: var(--gold); transform: translateY(-2px); }
        .link-btn i { font-size: 18px; }
        .link-btn.whatsapp i { color: #25D366; }
        .link-btn.telegram i { color: #0088cc; }
        .link-btn.truecaller i { color: #1a73e8; }
        .link-btn.google i { color: #4285F4; }
        .result-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            background: rgba(0,0,0,0.25);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 18px;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .result-info div { text-align: center; }
        .result-info .num { color: var(--gold); font-size: 15px; font-weight: 700; }
        .result-info .lbl { color: var(--text-muted); font-size: 10px; }
        .footer {
            text-align: center;
            padding: 20px 20px 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            margin-top: 35px;
        }
        .footer .dev-info { color: var(--text-muted); font-size: 13px; }
        .footer .dev-info .highlight { color: var(--gold); font-weight: 700; }
        @media (max-width: 768px) {
            .container { padding: 20px 14px 30px; }
            .search-card { padding: 22px 16px 18px; }
            .input-row { flex-direction: column; }
            .btn-search { width: 100%; justify-content: center; }
            .country-grid { grid-template-columns: repeat(auto-fit, minmax(55px, 1fr)); }
            .links-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="particles" id="particles"></div>

<div class="container">
    <div class="header">
        <div class="logo">⌾ محرك البحث عن أي رقم</div>
        <div class="sub">أداة مدمجة - <span class="highlight">@SIN_PHP</span> & <span class="highlight">مبرمج منصور</span></div>
    </div>

    <div class="search-card">
        <div class="title-area">
            <h2>ابحث عن أي رقم هاتف</h2>
            <p>اختر الدولة، أدخل الرقم ثم اضغط بحث</p>
        </div>

        <div class="country-grid" id="countryGrid">
            <div class="country-btn active" data-code="964"><span class="code">+964</span><span class="name">العراق</span></div>
            <div class="country-btn" data-code="966"><span class="code">+966</span><span class="name">السعودية</span></div>
            <div class="country-btn" data-code="971"><span class="code">+971</span><span class="name">الإمارات</span></div>
            <div class="country-btn" data-code="962"><span class="code">+962</span><span class="name">الأردن</span></div>
            <div class="country-btn" data-code="20"><span class="code">+20</span><span class="name">مصر</span></div>
            <div class="country-btn" data-code="961"><span class="code">+961</span><span class="name">لبنان</span></div>
            <div class="country-btn" data-code="967"><span class="code">+967</span><span class="name">اليمن</span></div>
        </div>

        <div class="input-row">
            <div class="input-wrap">
                <span class="prefix" id="phonePrefix">+964</span>
                <input type="text" id="phoneInput" placeholder="أدخل رقم الهاتف ..." dir="ltr">
            </div>
            <button class="btn-search" id="searchBtn" onclick="generateLinks()">
                <i class="fas fa-search"></i> بحث شامل
            </button>
        </div>
    </div>

    <div class="results-area" id="resultsArea"></div>

    <div class="footer">
        <div class="dev-info">
            <span class="highlight">@SIN_PHP</span> · <span class="highlight">مبرمج منصور</span> · <span class="highlight">@K_K2P</span>
        </div>
        <div style="color:#555577;font-size:11px;">روابط مباشرة لـ Truecaller و Google و WhatsApp والمزيد</div>
    </div>
</div>

<script>
    function createParticles() {
        const container = document.getElementById('particles');
        for(let i = 0; i < 35; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 12 + 's';
            p.style.animationDuration = (10 + Math.random() * 8) + 's';
            p.style.width = (2 + Math.random() * 3) + 'px';
            p.style.height = p.style.width;
            container.appendChild(p);
        }
    }
    createParticles();

    let selectedCode = '964';
    document.querySelectorAll('.country-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.country-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            selectedCode = this.dataset.code;
            document.getElementById('phonePrefix').textContent = '+' + selectedCode;
        });
    });

    document.getElementById('phoneInput').addEventListener('paste', function() {
        setTimeout(() => {
            let val = this.value.trim();
            if(val.startsWith('+')) {
                let match = val.match(/^\+(\d+)/);
                if(match) {
                    let code = match[1];
                    let rest = val.substring(code.length + 1);
                    document.querySelectorAll('.country-btn').forEach(b => {
                        if(b.dataset.code === code) b.click();
                    });
                    this.value = rest;
                }
            }
        }, 50);
    });

    function generateLinks() {
        let phone = document.getElementById('phoneInput').value.trim();
        if(!phone) { alert('الرجاء إدخال رقم الهاتف'); return; }

        // إزالة الرموز غير الرقمية عدا +
        phone = phone.replace(/[^0-9+]/g, '');
        let code = selectedCode;

        if(phone.startsWith('+')) {
            let match = phone.match(/^\+(\d+)/);
            if(match) {
                code = match[1];
                phone = phone.substring(code.length + 1);
            }
        }

        phone = phone.replace(/^0+/, '');
        if(!phone || phone.length < 6) {
            alert('الرجاء إدخال رقم صحيح (6 أرقام على الأقل)');
            return;
        }

        const fullPhone = `+${code}${phone}`;
        const phoneNoPlus = `${code}${phone}`;

        const links = {
            'Truecaller': `https://www.truecaller.com/search/${encodeURIComponent(fullPhone)}`,
            'Google': `https://www.google.com/search?q=${encodeURIComponent('"' + fullPhone + '"')}`,
            'واتساب': `https://wa.me/${phoneNoPlus}`,
            'تليجرام': `tg://resolve?phone=${fullPhone}`,
            'فيسبوك': `https://www.facebook.com/search/top/?q=${encodeURIComponent(fullPhone)}`,
            'انستغرام': `https://www.instagram.com/explore/search/?q=${encodeURIComponent(fullPhone)}`,
            'تويتر': `https://twitter.com/search?q=${encodeURIComponent(fullPhone)}`,
            'تيك توك': `https://www.tiktok.com/search?q=${encodeURIComponent(fullPhone)}`,
            'يوتيوب': `https://www.youtube.com/results?search_query=${encodeURIComponent(fullPhone)}`,
            'لينكد إن': `https://www.linkedin.com/search/results/all/?keywords=${encodeURIComponent(fullPhone)}`,
            'سناب شات': `https://www.snapchat.com/add/${phoneNoPlus}`
        };

        const icons = {
            'Truecaller': 'fas fa-phone',
            'Google': 'fab fa-google',
            'واتساب': 'fab fa-whatsapp',
            'تليجرام': 'fab fa-telegram',
            'فيسبوك': 'fab fa-facebook',
            'انستغرام': 'fab fa-instagram',
            'تويتر': 'fab fa-twitter',
            'تيك توك': 'fab fa-tiktok',
            'يوتيوب': 'fab fa-youtube',
            'لينكد إن': 'fab fa-linkedin',
            'سناب شات': 'fab fa-snapchat'
        };

        const colors = {
            'Truecaller': 'truecaller',
            'Google': 'google',
            'واتساب': 'whatsapp',
            'تليجرام': 'telegram'
        };

        let html = `
            <div class="result-info">
                <div><div class="lbl">رقم الهاتف</div><div class="num">${fullPhone}</div></div>
                <div><div class="lbl">رمز الدولة</div><div class="num">+${code}</div></div>
                <div><div class="lbl">عدد الروابط</div><div class="num">${Object.keys(links).length}</div></div>
            </div>
            <div class="links-grid">
        `;

        for(let [name, url] of Object.entries(links)) {
            let icon = icons[name] || 'fas fa-link';
            let colorClass = colors[name] || '';
            html += `<a href="${url}" target="_blank" class="link-btn ${colorClass}"><i class="${icon}"></i>${name}</a>`;
        }

        html += `</div>`;
        document.getElementById('resultsArea').innerHTML = html;
        document.getElementById('resultsArea').classList.add('active');
        document.getElementById('resultsArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    document.getElementById('phoneInput').addEventListener('keypress', function(e) {
        if(e.key === 'Enter') generateLinks();
    });
</script>
</body>
</html>
