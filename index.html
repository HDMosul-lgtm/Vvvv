<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT - مبرمج منصور</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #111111;
            --border: #1a1a1a;
            --text: #c0c0c0;
            --red: #ff1744;
            --green: #00e676;
            --gold: #ffb300;
            --accent: #d50000;
            --glow: #ff0000;
            --truecaller-blue: #1a73e8;
            --google-blue: #4285F4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Courier New', 'Cairo', monospace;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
            background-image: radial-gradient(ellipse at center, rgba(255, 0, 0, 0.03) 0%, transparent 70%),
                radial-gradient(ellipse at 20% 80%, rgba(255, 0, 0, 0.02) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 0, 0, 0.02) 0%, transparent 60%);
            position: relative;
        }

        /* شاشة القفل */
        .lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            transition: opacity 0.4s ease;
        }
        .lock-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .lock-box {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 35px 30px;
            text-align: center;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.2);
            width: 90%;
            max-width: 380px;
        }
        .lock-box h2 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #fff;
            letter-spacing: 2px;
        }
        .lock-box .lock-icon {
            font-size: 50px;
            margin-bottom: 15px;
            display: block;
        }
        .lock-box input {
            width: 100%;
            padding: 14px 20px;
            margin: 18px 0 12px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            font-size: 22px;
            text-align: center;
            color: #fff;
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
            outline: none;
            transition: 0.3s;
        }
        .lock-box input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }
        .lock-box button {
            background: #b71c1c;
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            font-family: 'Courier New', monospace;
        }
        .lock-box button:hover {
            background: #d32f2f;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
        }
        .lock-error {
            color: #ff5252;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
        .lock-error.show {
            display: block;
            animation: shake 0.5s ease;
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: linear-gradient(rgba(255, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridPulse 4s ease-in-out infinite;
        }

        @keyframes gridPulse {
            0%,
            100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            background: var(--glow);
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.1;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 780px; /* زيادة للابتوب */
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            font-size: 60px;
            animation: skullFloat 3s ease-in-out infinite;
            display: inline-block;
            filter: drop-shadow(0 0 25px rgba(255, 0, 0, 0.7));
        }
        @keyframes skullFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        .header h1 {
            font-size: 34px; /* أكبر قليلاً */
            font-weight: bold;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.8), 0 0 60px rgba(255, 0, 0, 0.4);
            margin: 10px 0;
        }
        .header .subtitle {
            font-size: 15px;
            color: #888;
            letter-spacing: 3px;
        }
        /* تكبير اسم مبرمج منصور */
        .header .made-by {
            display: inline-block;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 22px; /* كان 15px */
            font-weight: bold;
            color: var(--red);
            letter-spacing: 3px;
            margin-top: 15px;
            animation: glowPulse 2s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,
            100% {
                box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
            }
            50% {
                box-shadow: 0 0 25px rgba(255, 0, 0, 0.7), 0 0 50px rgba(255, 0, 0, 0.3);
            }
        }

        .search-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 35px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 0, 0, 0.08) inset;
            position: relative;
            overflow: hidden;
        }
        .search-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 40px;
            right: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 0, 0.5), transparent);
        }
        .search-card .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .search-card input {
            flex: 1;
            min-width: 250px;
            background: #1a1a1a;
            border: 2px solid #2a2a2a;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 20px;
            color: #fff;
            font-family: 'Courier New', 'Cairo', monospace;
            letter-spacing: 3px;
            transition: all 0.3s;
            outline: none;
            direction: ltr;
            text-align: center;
        }
        .search-card input:focus {
            border-color: var(--red);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.2), 0 0 0 4px rgba(255, 0, 0, 0.05);
        }
        .search-card input::placeholder {
            color: #555;
            letter-spacing: 1px;
            font-size: 15px;
        }
        .btn-search {
            background: linear-gradient(135deg, #b71c1c, #7f0000);
            color: #fff;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 17px;
            font-weight: bold;
            letter-spacing: 2px;
            font-family: 'Courier New', 'Cairo', monospace;
            transition: all 0.3s;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }
        .btn-search:hover {
            box-shadow: 0 0 35px rgba(255, 0, 0, 0.5), 0 0 70px rgba(255, 0, 0, 0.2);
            transform: translateY(-2px);
            background: linear-gradient(135deg, #d32f2f, #9a0000);
        }
        .btn-search:active {
            transform: scale(0.95);
        }
        .btn-search:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .console {
            margin-top: 25px;
            background: #050505;
            border: 1px solid #1a1a1a;
            border-radius: 10px;
            padding: 18px;
            max-height: 220px;
            overflow-y: auto;
            display: none;
            font-size: 13px;
            line-height: 2;
        }
        .console.active {
            display: block;
        }
        .console .line {
            padding: 2px 0;
            animation: fadeInLine 0.3s ease;
        }
        @keyframes fadeInLine {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .console .line.error {
            color: #ff5252;
        }
        .console .line.warning {
            color: #ffab00;
        }
        .console .line.success {
            color: #69f0ae;
        }
        .console .line.info {
            color: #448aff;
        }
        .console .line.processing {
            color: #ccc;
        }
        .cursor-blink {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: #ff0000;
            animation: blink 0.6s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .results {
            margin-top: 25px;
            display: none;
        }
        .results.active {
            display: block;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .result-header {
            background: rgba(255, 0, 0, 0.08);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 18px;
            font-size: 16px;
            text-align: center;
            color: #ff8a80;
            letter-spacing: 2px;
        }
        .result-header .query-display {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 4px;
            direction: ltr;
            display: block;
        }
        .truecaller-card {
            background: #0d1b2a;
            border: 1px solid #1b3a5c;
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: #c0d8f0;
            font-family: 'Courier New', 'Cairo', monospace;
            position: relative;
            overflow: hidden;
        }
        .truecaller-card:hover {
            background: #12253b;
            border-color: #2a5a9c;
            box-shadow: 0 0 25px rgba(26, 115, 232, 0.35);
            color: #ffffff;
            transform: translateY(-1px);
        }
        .truecaller-card .tc-icon {
            font-size: 28px;
            background: #1a73e8;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .truecaller-card .tc-info {
            flex: 1;
        }
        .truecaller-card .tc-label {
            font-size: 12px;
            color: #6a9fd8;
            letter-spacing: 1px;
        }
        .truecaller-card .tc-name {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 1px;
        }
        .truecaller-card .tc-detail {
            font-size: 11px;
            color: #6a9fd8;
            margin-top: 2px;
        }
        .truecaller-card .tc-arrow {
            font-size: 20px;
            opacity: 0.7;
            margin-right: auto;
        }

        .google-card,
        .ext-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: #c0c0c0;
            font-family: 'Courier New', 'Cairo', monospace;
            position: relative;
            overflow: hidden;
        }
        .google-card:hover,
        .ext-card:hover {
            background: #1f1f1f;
            color: #ffffff;
            transform: translateY(-1px);
        }
        .google-card:hover {
            border-color: #4285F4;
            box-shadow: 0 0 20px rgba(66, 133, 244, 0.25);
        }
        .ext-card:hover {
            border-color: #b0b0b0;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
        }
        .google-card .google-icon,
        .ext-card .ext-icon {
            font-size: 26px;
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: #1f1f1f;
        }
        .google-card .google-info,
        .ext-card .ext-info {
            flex: 1;
        }
        .google-card .google-label,
        .ext-card .ext-label {
            font-size: 12px;
            color: #888;
            letter-spacing: 1px;
        }
        .google-card .google-title,
        .ext-card .ext-title {
            font-size: 17px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 1px;
        }
        .google-card .google-detail,
        .ext-card .ext-detail {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }
        .google-card .google-arrow,
        .ext-card .ext-arrow {
            font-size: 20px;
            opacity: 0.7;
            margin-right: auto;
        }

        .app-card {
            background: #111;
            border: 1px solid #1f1f1f;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s;
            cursor: default;
            position: relative;
            overflow: hidden;
        }
        .app-card:hover {
            border-color: #333;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
            background: #151515;
        }
        .app-card.clickable {
            cursor: pointer;
            border-left: 3px solid #ff0000;
            transition: all 0.3s;
        }
        .app-card.clickable:hover {
            border-color: #ff5252;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4), 0 5px 20px rgba(0, 0, 0, 0.5);
            background: #1a0000;
            transform: scale(1.02);
        }
        .app-card.clickable::after {
            content: '🔗 فتح مباشر';
            position: absolute;
            top: 12px;
            right: 14px;
            font-size: 10px;
            color: #ff5252;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .app-card.clickable:hover::after {
            opacity: 1;
        }
        .app-card .app-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
        }
        .app-card .app-info {
            flex: 1;
        }
        .app-card .app-name {
            font-weight: bold;
            font-size: 17px;
            color: #fff;
            letter-spacing: 1px;
        }
        .app-card .app-detail {
            font-size: 13px;
            color: #888;
            margin-top: 3px;
            direction: ltr;
            text-align: right;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-active {
            background: #00e676;
            box-shadow: 0 0 12px #00e676;
        }
        .status-inactive {
            background: #555;
        }
        .status-error {
            background: #ff1744;
            box-shadow: 0 0 12px #ff1744;
        }
        .status-possible {
            background: #ffab00;
            box-shadow: 0 0 12px #ffab00;
        }
        .app-card .risk-badge {
            position: absolute;
            top: 12px;
            left: 14px;
            font-size: 10px;
            padding: 4px 12px;
            border-radius: 15px;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .risk-high {
            background: rgba(255, 0, 0, 0.2);
            color: #ff5252;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }
        .risk-medium {
            background: rgba(255, 171, 0, 0.2);
            color: #ffab00;
            border: 1px solid rgba(255, 171, 0, 0.3);
        }
        .risk-low {
            background: rgba(0, 230, 118, 0.2);
            color: #69f0ae;
            border: 1px solid rgba(0, 230, 118, 0.3);
        }
        .app-card.error-card {
            border-right: 3px solid #ff1744;
            background: #1a0000;
            border-color: #330000;
        }
        .app-card.error-card .app-name {
            color: #ff5252;
        }
        .app-card.error-card .app-detail {
            color: #ff5252;
            opacity: 0.8;
        }

        .reset-btn {
            display: block;
            width: 100%;
            margin-top: 18px;
            background: transparent;
            border: 1px solid #333;
            color: #999;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Courier New', 'Cairo', monospace;
            letter-spacing: 1px;
            transition: all 0.3s;
            font-size: 14px;
        }
        .reset-btn:hover {
            border-color: #666;
            color: #fff;
        }

        .error-msg {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff5252;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            margin-top: 18px;
            display: none;
            letter-spacing: 1px;
            font-size: 14px;
        }
        .error-msg.active {
            display: block;
            animation: shake 0.5s ease;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-8px);
            }
            75% {
                transform: translateX(8px);
            }
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            color: #444;
            font-size: 13px;
            letter-spacing: 2px;
        }
        .footer span {
            color: #7f0000;
            font-weight: bold;
        }

        .console::-webkit-scrollbar {
            width: 5px;
        }
        .console::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        .console::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 5px;
        }

        @media (min-width: 1024px) {
            .main-container {
                max-width: 850px;
            }
            .search-card {
                padding: 45px 40px;
            }
            .search-card input {
                font-size: 22px;
                padding: 18px 22px;
            }
            .btn-search {
                padding: 18px 36px;
                font-size: 18px;
            }
            .header h1 {
                font-size: 38px;
            }
            .truecaller-card .tc-name,
            .ext-card .ext-title {
                font-size: 20px;
            }
            .header .made-by {
                font-size: 26px;
                padding: 12px 35px;
            }
        }

        @media (max-width: 600px) {
            .search-card {
                padding: 20px 15px;
            }
            .search-card input {
                font-size: 15px;
                padding: 12px;
                min-width: 150px;
            }
            .btn-search {
                padding: 12px 18px;
                font-size: 14px;
                width: 100%;
            }
            .header h1 {
                font-size: 22px;
            }
            .app-card {
                padding: 12px;
                gap: 10px;
            }
            .app-card .app-icon {
                width: 38px;
                height: 38px;
                font-size: 18px;
            }
            .truecaller-card .tc-name,
            .ext-card .ext-title {
                font-size: 16px;
            }
            .header .made-by {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- شاشة القفل -->
    <div class="lock-screen" id="lockScreen">
        <div class="lock-box">
            <span class="lock-icon">🔒</span>
            <h2>OSINT LOCK</h2>
            <p style="color:#aaa; margin-bottom:10px;">أدخل كود الدخول</p>
            <input type="password" id="lockInput" placeholder="كود الدخول" maxlength="8" autocomplete="off">
            <button onclick="checkLockCode()">دخول</button>
            <div class="lock-error" id="lockError">❌ كود خاطئ!</div>
        </div>
    </div>

    <!-- المحتوى الأصلي مخفي حتى إلغاء القفل -->
    <div id="mainContent" style="display: none; width: 100%;">
        <div class="grid-bg"></div>
        <div class="particles" id="particles"></div>

        <div class="main-container">
            <div class="header">
                <div class="logo-icon">💀</div>
                <h1>OSINT ENGINE</h1>
                <p class="subtitle">رقم | يوزر | كشف الحسابات</p>
                <div class="made-by">⚡ مبرمج منصور ⚡</div>
            </div>

            <div class="search-card">
                <div class="input-group">
                    <input type="text" id="queryInput" placeholder="رقم هاتف أو اسم مستخدم..." maxlength="40" autocomplete="off">
                    <button class="btn-search" id="searchBtn" onclick="startSearch()">🔍 بدء البحث</button>
                </div>

                <div class="console" id="console"></div>
                <div class="error-msg" id="errorMsg"></div>
                <div class="results" id="results"></div>
                <button class="reset-btn" id="resetBtn" style="display:none;" onclick="resetSearch()">🔄 بحث جديد</button>
            </div>

            <div class="footer">
                Developed by <span>مبرمج منصور</span> © 2024 — For Educational Purposes Only
            </div>
        </div>
    </div>

    <script>
        // ============== قفل بكود 2001820 ==============
        const LOCK_CODE = "2001820";
        const lockScreen = document.getElementById('lockScreen');
        const lockInput = document.getElementById('lockInput');
        const lockError = document.getElementById('lockError');
        const mainContent = document.getElementById('mainContent');

        function checkLockCode() {
            if (lockInput.value.trim() === LOCK_CODE) {
                lockScreen.classList.add('hidden');
                mainContent.style.display = 'block';
                // تأخير بسيط لإعادة تفعيل الجسيمات
                setTimeout(() => {
                    document.body.style.opacity = '1';
                }, 100);
                // بدء الجسيمات
                createParticles();
                // تشغيل الدوال الأصلية
                window.addEventListener('load', function() {
                    document.body.style.opacity = '1';
                });
            } else {
                lockError.classList.add('show');
                lockInput.value = '';
                lockInput.focus();
                setTimeout(() => {
                    lockError.classList.remove('show');
                }, 2000);
            }
        }

        // السماح بالدخول بالضغط على Enter من حقل القفل
        lockInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkLockCode();
            }
        });

        // ============== باقي الكود الأصلي ==============
        (function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            const count = 40;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                const size = Math.random() * 3 + 1;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = Math.random() * 8 + 6 + 's';
                p.style.animationDelay = Math.random() * 8 + 's';
                container.appendChild(p);
            }
        });

        function getStoredData(query) {
            const key = 'osint_mansour_' + query.replace(/[^a-zA-Z0-9_@.]/g, '');
            const stored = localStorage.getItem(key);
            if (stored) {
                try { return JSON.parse(stored); } catch (e) { return null; }
            }
            return null;
        }

        function storeData(query, data) {
            const key = 'osint_mansour_' + query.replace(/[^a-zA-Z0-9_@.]/g, '');
            localStorage.setItem(key, JSON.stringify(data));
        }

        function isPhoneNumber(query) {
            const cleaned = query.replace(/[^0-9]/g, '');
            return cleaned.length >= 7 && (cleaned.length / query.length) > 0.7;
        }

        function generateFakePhoneData(phone) {
            const clean = phone.replace(/[^0-9]/g, '');
            const seed = clean.split('').reduce((a, b) => a + parseInt(b || 0), 0);
            const additionalApps = [
                { name: 'فيسبوك', icon: '📘', color: '#1877F2' },
                { name: 'انستغرام', icon: '📷', color: '#E4405F' },
                { name: 'سناب شات', icon: '👻', color: '#FFFC00' },
                { name: 'تيك توك', icon: '🎵', color: '#000000' },
                { name: 'تويتر / X', icon: '🐦', color: '#1DA1F2' },
                { name: 'لينكد إن', icon: '💼', color: '#0A66C2' },
                { name: 'تمبلر', icon: '📝', color: '#36465D' },
                { name: 'ريديت', icon: '🤖', color: '#FF4500' },
                { name: 'باي بال', icon: '💰', color: '#003087' },
                { name: 'جوجل', icon: '🔍', color: '#4285F4' },
            ];
            const shuffled = [...additionalApps].sort(() => Math.random() - 0.5);
            const count = 3 + (seed % 5);
            const selectedApps = shuffled.slice(0, Math.min(count, shuffled.length));
            return {
                type: 'phone',
                phone: phone,
                cleanPhone: clean,
                failedApps: selectedApps,
                generatedAt: new Date().toISOString(),
                seed: seed,
            };
        }

        function generateUsernameResults(username) {
            const clean = username.replace(/[^a-zA-Z0-9_]/g, '');
            const socialApps = [
                { name: 'فيسبوك', icon: '📘', color: '#1877F2', url: `https://www.facebook.com/${clean}` },
                { name: 'انستغرام', icon: '📷', color: '#E4405F', url: `https://www.instagram.com/${clean}` },
                { name: 'سناب شات', icon: '👻', color: '#FFFC00', url: `https://www.snapchat.com/add/${clean}` },
                { name: 'تويتر / X', icon: '🐦', color: '#1DA1F2', url: `https://twitter.com/${clean}` },
                { name: 'تيك توك', icon: '🎵', color: '#000000', url: `https://www.tiktok.com/@${clean}` },
                { name: 'تيليجرام', icon: '✈️', color: '#0088cc', url: `https://t.me/${clean}` },
                { name: 'يوتيوب', icon: '▶️', color: '#FF0000', url: `https://www.youtube.com/@${clean}` },
            ];
            return {
                type: 'username',
                username: username,
                cleanUsername: clean,
                socialApps: socialApps,
                generatedAt: new Date().toISOString(),
            };
        }

        let isSearching = false;

        async function startSearch() {
            if (isSearching) return;

            const input = document.getElementById('queryInput');
            const query = input.value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const consoleEl = document.getElementById('console');
            const resultsEl = document.getElementById('results');
            const resetBtn = document.getElementById('resetBtn');
            const searchBtn = document.getElementById('searchBtn');

            errorMsg.classList.remove('active');
            errorMsg.textContent = '';
            resultsEl.classList.remove('active');
            resultsEl.innerHTML = '';
            resetBtn.style.display = 'none';
            consoleEl.classList.remove('active');
            consoleEl.innerHTML = '';

            if (!query || query.length < 3) {
                errorMsg.textContent = '⚠️ خطأ: يجب إدخال 3 أحرف على الأقل.';
                errorMsg.classList.add('active');
                input.focus();
                return;
            }

            const phoneMode = isPhoneNumber(query);

            isSearching = true;
            searchBtn.disabled = true;
            searchBtn.textContent = '⏳ جاري البحث...';
            consoleEl.classList.add('active');

            const logLines = [
                { text: '[+] Initializing OSINT Engine v4.2...', type: 'info', delay: 200 },
                { text: '[+] Connecting to secure nodes...', type: 'info', delay: 400 },
                { text: '[~] Establishing encrypted tunnel...', type: 'processing', delay: 300 },
                { text: phoneMode ? '[+] Phone number detected.' : '[+] Username detected.', type: 'info',
                delay: 250 },
                { text: '[~] Querying databases...', type: 'processing', delay: 400 },
                { text: '[+] Cross-referencing profiles...', type: 'info', delay: 350 },
                { text: '[✓] Scan complete.', type: 'success', delay: 150 },
            ];

            for (let i = 0; i < logLines.length; i++) {
                await sleep(logLines[i].delay);
                const lineDiv = document.createElement('div');
                lineDiv.classList.add('line', logLines[i].type);
                lineDiv.textContent = logLines[i].text;
                consoleEl.appendChild(lineDiv);
                consoleEl.scrollTop = consoleEl.scrollHeight;
            }

            const cursorLine = document.createElement('div');
            cursorLine.classList.add('line', 'processing');
            cursorLine.innerHTML = '[>] Loading results... <span class="cursor-blink"></span>';
            consoleEl.appendChild(cursorLine);
            consoleEl.scrollTop = consoleEl.scrollHeight;
            await sleep(700);
            cursorLine.remove();

            if (phoneMode) {
                let data = getStoredData(query);
                if (!data) {
                    data = generateFakePhoneData(query);
                    storeData(query, data);
                }
                const rawPhone = query.replace(/\s/g, '');
                displayPhoneResults(data, rawPhone);
                resultsEl.classList.add('active');
                resetBtn.style.display = 'block';
                searchBtn.disabled = false;
                searchBtn.textContent = '🔍 بدء البحث';
                isSearching = false;
                await fetchFailedApps(data, consoleEl);
            } else {
                const data = generateUsernameResults(query);
                displayUsernameResults(data);
                resultsEl.classList.add('active');
                resetBtn.style.display = 'block';
                searchBtn.disabled = false;
                searchBtn.textContent = '🔍 بدء البحث';
                isSearching = false;

                const finalLine = document.createElement('div');
                finalLine.classList.add('line', 'success');
                finalLine.textContent = '[✓] تم العثور على ' + data.socialApps.length + ' رابط محتمل.';
                consoleEl.appendChild(finalLine);
                consoleEl.scrollTop = consoleEl.scrollHeight;
            }
        }

        function displayPhoneResults(data, rawPhone) {
            const resultsEl = document.getElementById('results');
            const cleanForUrl = rawPhone.replace(/[^0-9+]/g, '');
            const truecallerUrl = `https://www.truecaller.com/search/${encodeURIComponent(cleanForUrl)}`;
            const googleSearchUrl = `https://www.google.com/search?q=${encodeURIComponent('"' + rawPhone + '"')}`;

            let html = `
            <div class="result-header">
                <span>🎯 نتيجة البحث عن الرقم:</span>
                <span class="query-display">${rawPhone}</span>
            </div>
            <a href="${truecallerUrl}" target="_blank" class="truecaller-card" rel="noopener">
                <div class="tc-icon">📞</div>
                <div class="tc-info">
                    <div class="tc-label">Truecaller</div>
                    <div class="tc-name">البحث عن الرقم في Truecaller</div>
                    <div class="tc-detail">فتح في نافذة جديدة</div>
                </div>
                <div class="tc-arrow">🔗</div>
            </a>
            <a href="${googleSearchUrl}" target="_blank" class="google-card" rel="noopener">
                <div class="google-icon">🔍</div>
                <div class="google-info">
                    <div class="google-label">Google • بحث متقدم</div>
                    <div class="google-title">البحث عن الرقم في Google</div>
                    <div class="google-detail">البحث عن حسابات مرتبطة، إعلانات، صفحات</div>
                </div>
                <div class="google-arrow">🌐</div>
            </a>
            <div class="app-card clickable" onclick="window.open('https://wa.me/${cleanForUrl.replace('+','')}', '_blank')">
                <div class="app-icon" style="background:#25D36622; color:#25D366;">💬</div>
                <div class="app-info">
                    <div class="app-name">واتساب</div>
                    <div class="app-detail">محادثة مشفرة</div>
                </div>
                <div class="status-dot status-active" title="نشط"></div>
                <div class="risk-badge risk-low">خطر منخفض</div>
            </div>
            <div class="app-card clickable" onclick="window.open('tg://resolve?phone=${cleanForUrl}', '_blank')">
                <div class="app-icon" style="background:#0088cc22; color:#0088cc;">✈️</div>
                <div class="app-info">
                    <div class="app-name">تيليجرام</div>
                    <div class="app-detail">قناة مشفرة</div>
                </div>
                <div class="status-dot status-active" title="نشط"></div>
                <div class="risk-badge risk-medium">خطر متوسط</div>
            </div>
            <div id="failedAppsContainer"></div>
            <div style="text-align:center;margin-top:18px;color:#555;font-size:12px;letter-spacing:1px;">
                🔒 بيانات وهمية للأغراض التعليمية | مبرمج منصور
            </div>
          `;
            resultsEl.innerHTML = html;
        }

        function displayUsernameResults(data) {
            const resultsEl = document.getElementById('results');
            const googleSearchUrl = `https://www.google.com/search?q=${encodeURIComponent(data.username)}`;

            let html = `
            <div class="result-header">
                <span>🔍 نتيجة البحث عن المستخدم:</span>
                <span class="query-display">${data.username}</span>
            </div>
            <a href="${googleSearchUrl}" target="_blank" class="google-card" rel="noopener">
                <div class="google-icon">🔍</div>
                <div class="google-info">
                    <div class="google-label">Google • بحث متقدم</div>
                    <div class="google-title">البحث عن ${data.username} في Google</div>
                    <div class="google-detail">البحث عن حسابات مرتبطة، إعلانات، صفحات</div>
                </div>
                <div class="google-arrow">🌐</div>
            </a>
          `;

            data.socialApps.forEach((app, index) => {
                html += `
                <div class="app-card clickable" onclick="window.open('${app.url}', '_blank')" style="animation: fadeInUp 0.3s ease ${index * 0.05}s both;">
                    <div class="app-icon" style="background:${app.color}22; color:${app.color};">
                      ${app.icon}
                    </div>
                    <div class="app-info">
                      <div class="app-name">${app.name}</div>
                      <div class="app-detail">${app.url.replace('https://','')}</div>
                    </div>
                    <div class="status-dot status-possible" title="محتمل"></div>
                    <div class="risk-badge risk-medium">محتمل</div>
                </div>
              `;
            });

            html += `
            <div style="text-align:center;margin-top:18px;color:#555;font-size:12px;letter-spacing:1px;">
                🔒 روابط محتملة | مبرمج منصور
            </div>
          `;
            resultsEl.innerHTML = html;
        }

        async function fetchFailedApps(data, consoleEl) {
            const container = document.getElementById('failedAppsContainer');
            if (!container || !data.failedApps) return;

            const appsToTry = data.failedApps;
            const startMsg = document.createElement('div');
            startMsg.classList.add('line', 'processing');
            startMsg.textContent = '[~] بدء محاولات جلب التطبيقات الإضافية...';
            consoleEl.appendChild(startMsg);
            consoleEl.scrollTop = consoleEl.scrollHeight;
            await sleep(600);

            let failCount = 0;
            for (let i = 0; i < appsToTry.length; i++) {
                const app = appsToTry[i];
                const preErrors = [
                    { text: `[~] محاولة جلب ${app.name}...`, type: 'processing' },
                    { text: `[×] خطأ: تعذر حل DNS لخادم ${app.name}`, type: 'error' },
                    { text: `[!] تحذير: شهادة SSL غير صالحة لـ ${app.name}`, type: 'warning' },
                    { text: `[×] خطأ: تم رفض الاتصال من قبل ${app.name} (خطأ 403)`, type: 'error' },
                ];
                for (const log of preErrors) {
                    await sleep(300 + Math.random() * 400);
                    const lineDiv = document.createElement('div');
                    lineDiv.classList.add('line', log.type);
                    lineDiv.textContent = log.text;
                    consoleEl.appendChild(lineDiv);
                    consoleEl.scrollTop = consoleEl.scrollHeight;
                }
                const failMsg = document.createElement('div');
                failMsg.classList.add('line', 'error');
                failMsg.textContent = `[×] فشل نهائي في جلب ${app.name} — تم التخطي`;
                consoleEl.appendChild(failMsg);
                consoleEl.scrollTop = consoleEl.scrollHeight;
                failCount++;
                await sleep(200);

                const card = document.createElement('div');
                card.className = 'app-card error-card';
                card.style.animation = `fadeInUp 0.4s ease ${failCount * 0.08}s both`;
                card.innerHTML = `
                    <div class="app-icon" style="background:${app.color}22; color:${app.color}; opacity:0.5;">${app.icon}</div>
                    <div class="app-info">
                      <div class="app-name">${app.name} <span style="color:#ff5252;">(فشل الجلب)</span></div>
                      <div class="app-detail" style="color:#ff5252;">تعذر الوصول إلى البيانات</div>
                    </div>
                    <div class="status-dot status-error" title="فشل"></div>
                    <div class="risk-badge risk-high">خطأ</div>
                `;
                container.appendChild(card);
                await sleep(200);
            }
            const finalMsg = document.createElement('div');
            finalMsg.classList.add('line', 'error');
            finalMsg.textContent = `[×] جميع محاولات الجلب فشلت (${failCount} فشل). التطبيقات مخفية أو محمية.`;
            consoleEl.appendChild(finalMsg);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function resetSearch() {
            document.getElementById('results').classList.remove('active');
            document.getElementById('results').innerHTML = '';
            document.getElementById('console').classList.remove('active');
            document.getElementById('console').innerHTML = '';
            document.getElementById('errorMsg').classList.remove('active');
            document.getElementById('errorMsg').textContent = '';
            document.getElementById('resetBtn').style.display = 'none';
            document.getElementById('queryInput').value = '';
            document.getElementById('queryInput').focus();
            document.getElementById('searchBtn').disabled = false;
            document.getElementById('searchBtn').textContent = '🔍 بدء البحث';
            isSearching = false;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        document.getElementById('queryInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                startSearch();
            }
        });

        const placeholderTexts = [
            'رقم هاتف أو اسم مستخدم...',
            'مثال: 077xxxxxxxx',
            'مثال: +964770000000',
            'مثال: @mansour',
        ];
        let placeholderIndex = 0;
        setInterval(() => {
            const input = document.getElementById('queryInput');
            if (input && document.activeElement !== input && !input.value) {
                placeholderIndex = (placeholderIndex + 1) % placeholderTexts.length;
                input.placeholder = placeholderTexts[placeholderIndex];
            }
        }, 3500);

        window.addEventListener('load', () => {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.6s ease';
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 100);
        });

        console.log('%c⚠️ تحذير %c| %cمبرمج منصور %c| هذه الأداة للأغراض التعليمية فقط!',
            'color:#ff0000;font-size:20px;', '', 'color:#ffb300;font-size:16px;', '');
        console.log('%cجميع البيانات المعروضة وهمية ولا تمت للواقع بصلة.', 'color:#888;');
    </script>
</body>
</html>
